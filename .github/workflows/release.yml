name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark as pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.next.outputs.value }}
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Calculate next version
        id: next
        shell: bash
        run: |
          latest="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
          current="${latest#v}"
          if [ -z "$current" ]; then
            current="$(node -p "require('./app/package.json').version")"
          fi
          IFS=. read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "value=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${latest}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          PREVIOUS_TAG: ${{ steps.next.outputs.previous_tag }}
          RELEASE_TAG: v${{ steps.next.outputs.value }}
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          node .github/scripts/generate-release-notes.mjs > "$notes_file"
          delimiter="release_notes_$(date +%s%N)_${RANDOM}"
          {
            echo "body<<${delimiter}"
            cat "$notes_file"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

  publish:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --bundles msi,nsis
          - os: macos-14
            args: --bundles dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Apply release version
        working-directory: app
        run: node scripts/set-version.mjs ${{ needs.version.outputs.value }}
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: v${{ needs.version.outputs.value }}
          releaseName: PlainMint v${{ needs.version.outputs.value }}
          releaseBody: ${{ needs.version.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          assetNamePattern: PlainMint_[version]_[platform]_[arch][_setup].[ext]
      - name: Package Windows portable edition
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./app/scripts/build-windows.ps1 -PackageOnly
      - name: Publish normalized Windows package set
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ needs.version.outputs.value }}"
          $assets = Get-ChildItem ./artifacts/windows -File | Where-Object {
            $_.Name -eq 'SHA256SUMS.txt' -or $_.Name -like '*_portable.zip'
          } | Select-Object -ExpandProperty FullName
          gh release upload $tag @assets --clobber
